<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Systems Consulting &amp; AI Roadmap — Somaya Sharma</title>
    <meta name="description" content="Personal study roadmap and learning tracker for transition into London-based Systems Consulting, Process Architecture, and Enterprise AI roles.">
    <link rel="stylesheet" href="study.css">
</head>
<body>

    <div class="app-container">
        
        <!-- SIDEBAR CONTAINER -->
        <aside class="sidebar">
            <div class="brand-section">
                <h1 class="brand-title">Somaya Sharma</h1>
                <p class="brand-subtitle">Study &amp; Systems Switch</p>
            </div>

            <!-- PROGRESS WIDGET -->
            <div class="progress-widget">
                <div class="progress-header">
                    <span class="progress-label">Your Progress</span>
                    <span class="progress-pct" id="progress-text">0%</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progress-fill"></div>
                </div>
                <div class="progress-stats">
                    <span>Completed:</span>
                    <span><strong id="count-completed">0</strong> / <span id="count-total">25</span> days</span>
                </div>
                <span class="progress-rank-badge" id="current-rank">Systems Apprentice</span>
            </div>

            <!-- PHASE FILTER MENU -->
            <nav class="filter-menu">
                <span class="filter-menu-label">Roadmap Phases</span>
                <button class="filter-btn" data-phase="all">All Phases</button>
                <button class="filter-btn" data-phase="1">P1: Consulting Foundations</button>
                <button class="filter-btn" data-phase="2">P2: Power Platform Mastery</button>
                <button class="filter-btn" data-phase="3">P3: Analytics &amp; Mining</button>
                <button class="filter-btn" data-phase="4">P4: AI &amp; ML in Operations</button>
                <button class="filter-btn" data-phase="5">P5: Case Prep &amp; Polish</button>
            </nav>

            <!-- ROADMAP ACTIONS -->
            <div class="sidebar-actions">
                <button class="action-btn btn-secondary" id="btn-export" title="Export study notes and checked status">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    <span>Backup Progress</span>
                </button>
                <button class="action-btn btn-secondary" id="btn-import" title="Restore status from backup code">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    <span>Restore Backup</span>
                </button>
                <button class="action-btn btn-danger" id="btn-reset" title="Clear all progress ticks and notes">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                    <span>Reset Roadmap</span>
                </button>
            </div>
        </aside>

        <!-- MAIN DASHBOARD CONTENT -->
        <main class="main-content">
            
            <header class="dashboard-header">
                <!-- Search bar -->
                <div class="search-box">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="search-input" placeholder="Search topics, platforms, resources...">
                </div>

                <!-- Controls -->
                <div class="header-controls">
                    <button id="theme-toggle" aria-label="Toggle visual theme">
                        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
                        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                    </button>
                </div>
            </header>

            <!-- ROADMAP CARD LIST -->
            <section class="roadmap-flow" id="roadmap-flow-container">
                <!-- Cards dynamically generated in JS -->
            </section>

        </main>
        
    </div>

    <!-- Scripts -->
    <script src="study.js"></script>
</body>
</html>
